version: 2.1

jobs:
  build:
    machine: true # executor type
    resource_class: brettwooldridge/ubuntu
    environment:
      JAVA_HOME: /usr/lib/jvm/java-25-openjdk-amd64
      PING_TEST_IP: 10.0.40.16
      PING_TEST_HOST: jenkins

    steps:
      # Commands run in a Linux virtual machine environment
      - run:
          name: Clone Repository via HTTPS Proxy
          command: |
            git clone https://${GITHUB_TOKEN}@github.com/brettwooldridge/jnb-ping.git .
            git checkout ${CIRCLE_SHA1}
      - run:
          name: Build and test with Bazel
          command: |
            export PATH=$JAVA_HOME/bin:$PATH
            bazel clean --expunge
            bazel test //src/test/kotlin/com/zaxxer/ping:ping-tests

